spring.application.name=backend-java
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Security & Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# JWT Secret
jwt.secret=${JWT_SECRET}

# Custom Portfolio Properties
admin.personal.email=${ADMIN_EMAIL}
portfolio.domain.link=${DOMAIN_LINK}

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SENDER_EMAIL}
spring.mail.password=${SENDER_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.cookie-secure=${COOKIE_SECURE:false}
app.security.cookie-same-site=${COOKIE_SAME_SITE:Lax}
app.security.cookie-domain=${COOKIE_DOMAIN:}

cloudinary.url=${CLOUDINARY_URL:}
server.port=${PORT:8080}


